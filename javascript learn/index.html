<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Javascript learn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <p id="text">Hello!</p>
  <button onclick="changeText()">Click Me</button>
  
  <input type="text" id="myInput" />
  <button onclick="addItem()">Add</button>
  <ul id="myList"></ul>

  <button onclick="showAlert()">Click Me</button>

  <p id="result"></p>
  <button onclick="getBrowser()">Check My Browser</button>

<h2 id="message">Click to see a dog!</h2>
  <img id="dogImage" src="" width="300" />
  <br><br>
  <button onclick="getDog()">Get Dog</button>

  <script src="index.js"></script>
<h2 id="joke">Click the button to get a joke!</h2>
  <button onclick="getJoke()">Get Joke</button>
  
  <input type="text" id="countryInput" placeholder="Type a country..." />
  <button onclick="getCountry()">Search</button>
  <br><br>
  <h2 id="name"></h2>
  <p id="capital"></p>
  <p id="population"></p>
  <img id="flag" src="" width="150" />



  <input type="text" id="pokemonName" placeholder="Enter Pokemon name">
  <button onclick="fetchData()">Fetch Pokemon</button><br>
  <img src="" alt="Pokemon Sprite" id="pokemonSprite" style="display: none">
  <script src="index.js"></script>



</body>
</html>
